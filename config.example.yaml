keybindings:
    - modifier:
        - Ctrl
        - Alt
      key: UP_ARROW
      bindfeature: moveToTop
      
    - modifier:
        - Ctrl
        - Alt
      key: DOWN_ARROW
      bindfeature: moveToBottom
      
    - modifier:
        - Ctrl
        - Alt
      key: LEFT_ARROW
      bindfeature: moveToLeft
      
    - modifier:
        - Ctrl
        - Alt
      key: RIGHT_ARROW
      bindfeature: moveToRight
      
    - modifier:
        - Ctrl
        - Alt
      key: U
      bindfeature: moveToTopLeft
      
    - modifier:
        - Ctrl
        - Alt
      key: I
      bindfeature: moveToTopRight
      
    - modifier:
        - Ctrl
        - Alt
      key: J
      bindfeature: moveToBottomLeft
      
    - modifier:
        - Ctrl
        - Alt
      key: K
      bindfeature: moveToBottomRight

    - modifier:
        - Ctrl
        - Alt
      key: =
      bindfeature: makeLarger

    - modifier:
        - Ctrl
        - Alt
      key: "-"
      bindfeature: makeSmaller

    - modifier:
        - Ctrl
        - Alt
        - Shift
      key: UP_ARROW
      bindfeature: makeFullHeight

    - modifier:
        - Ctrl
        - Win
        - Alt
      key: LEFT_ARROW
      bindfeature: previousDisplay

    - modifier:
        - Ctrl
        - Win
        - Alt
      key: RIGHT_ARROW
      bindfeature: nextDisplay

    - modifier:
        - Ctrl
        - Alt
      key: ENTER
      bindfeature: maximize

    - modifier:
        - Win
        - Alt
      key: C
      bindfeature: moveToCenter

    - modifier:
        - Win
        - Alt
      key: A
      bindfeature: toggleAlwaysOnTop

    - modifier:
        - Ctrl
        - Alt
      key: Q
      bindfeature: almostMaximize

    # Thirds (full height): numpad 1 = left, 2 = center, 3 = right
    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 1"
      bindfeature: moveToLeftThird

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 2"
      bindfeature: moveToCenterThird

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 3"
      bindfeature: moveToRightThird

    # 3×2 grid (six equal parts): numpad 7/8/9 = top row, numpad 4/5/6 = bottom row
    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 7"
      bindfeature: moveToTopLeftSixth

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 8"
      bindfeature: moveToTopCenterSixth

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 9"
      bindfeature: moveToTopRightSixth

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 4"
      bindfeature: moveToBottomLeftSixth

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 5"
      bindfeature: moveToBottomCenterSixth

    - modifier:
        - Ctrl
        - Alt
      key: "Numeric keypad 6"
      bindfeature: moveToBottomRightSixth

